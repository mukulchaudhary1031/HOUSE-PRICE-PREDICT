<!DOCTYPE html>
<html>
<head>
    <title>House Price Predictor</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
<h1>🏠 House Price Prediction</h1>

<form method="post" action="/predict">

<label>POSTED_BY:</label>
<select name="POSTED_BY" required>
<option value="Owner">Owner</option>
<option value="Builder">Builder</option>
<option value="Dealer">Dealer</option>
</select>

<label>UNDER_CONSTRUCTION:</label>
<input type="number" name="UNDER_CONSTRUCTION" placeholder="0 or 1" required>

<label>RERA:</label>
<input type="number" name="RERA" placeholder="0 or 1" required>

<label>BHK_NO:</label>
<input type="number" name="BHK_NO" placeholder="Enter BHK Number" required>

<label>BHK_OR_RK:</label>
<select name="BHK_OR_RK" required>
<option value="BHK">BHK</option>
<option value="RK">RK</option>
</select>

<label>SQUARE_FT:</label>
<input type="number" step="any" name="SQUARE_FT" placeholder="Enter Square Feet" required>

<label>READY_TO_MOVE:</label>
<input type="number" name="READY_TO_MOVE" placeholder="0 or 1" required>

<label>RESALE:</label>
<input type="number" name="RESALE" placeholder="0 or 1" required>

<label>ADDRESS:</label>
<input type="text" name="ADDRESS" placeholder="Enter City / Address" required>

<label>LONGITUDE:</label>
<input type="number" step="any" name="LONGITUDE" placeholder="Enter Longitude" required>

<label>LATITUDE:</label>
<input type="number" step="any" name="LATITUDE" placeholder="Enter Latitude" required>

<button type="submit">Predict</button>

</form>

{% if result %}
<div class="result">
<p><b>Predicted Price:</b> ₹ {{ result }} Lakhs</p>
</div>
{% endif %}

</div>

</body>
</html>
